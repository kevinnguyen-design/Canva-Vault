    <rect x="28" y="28" width="1000" height="78" rx="22" fill="#161616" stroke="#2a2a2a" stroke-width="2" />
    <text x="56" y="76" fill="#a78bfa" font-size="40" font-weight="800" font-family="Inter, Arial, sans-serif">Canva Vault</text>
    <rect x="336" y="40" width="344" height="54" rx="27" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="2" />
    <text x="366" y="75" fill="#acabaa" font-size="24" font-weight="500" font-family="Inter, Arial, sans-serif">Search shortcuts...</text>
    <rect x="708" y="40" width="164" height="54" rx="27" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="2" />
    <rect x="720" y="46" width="66" height="42" rx="18" fill="#a78bfa" />
    <text x="753" y="74" text-anchor="middle" fill="#111111" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Mac</text>
    <text x="823" y="74" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Windows</text>

    <rect x="28" y="134" width="250" height="324" rx="24" fill="#111111" stroke="#2a2a2a" stroke-width="2" />
    <rect x="42" y="148" width="222" height="58" rx="14" fill="rgba(167,139,250,0.14)" />
    <rect x="258" y="148" width="6" height="58" rx="3" fill="#a78bfa" />
    <text x="64" y="185" fill="#a78bfa" font-size="24" font-weight="500" font-family="Inter, Arial, sans-serif">General</text>
    <text x="64" y="240" fill="#acabaa" font-size="22" font-weight="500" font-family="Inter, Arial, sans-serif">Text</text>
    <text x="64" y="292" fill="#acabaa" font-size="22" font-weight="500" font-family="Inter, Arial, sans-serif">Elements</text>
    <text x="64" y="344" fill="#acabaa" font-size="22" font-weight="500" font-family="Inter, Arial, sans-serif">Video</text>
    <text x="64" y="396" fill="#acabaa" font-size="22" font-weight="500" font-family="Inter, Arial, sans-serif">Zoom</text>

