      <rect x="886" y="246" width="42" height="42" rx="8" fill="#2a2a2a" stroke="#000000" stroke-width="2" />
      <rect x="936" y="246" width="42" height="42" rx="8" fill="#2a2a2a" stroke="#000000" stroke-width="2" />
      <text x="907" y="273" text-anchor="middle" fill="#acabaa">⌘</text>
      <text x="957" y="273" text-anchor="middle" fill="#acabaa">Z</text>

      <rect x="886" y="316" width="42" height="42" rx="8" fill="#2a2a2a" stroke="#000000" stroke-width="2" />
      <rect x="936" y="316" width="42" height="42" rx="8" fill="#2a2a2a" stroke="#000000" stroke-width="2" />
      <text x="907" y="343" text-anchor="middle" fill="#acabaa">⌘</text>
      <text x="957" y="343" text-anchor="middle" fill="#acabaa">Y</text>

      <rect x="886" y="386" width="42" height="42" rx="8" fill="#2a2a2a" stroke="#000000" stroke-width="2" />
      <rect x="936" y="386" width="42" height="42" rx="8" fill="#2a2a2a" stroke="#000000" stroke-width="2" />
      <text x="907" y="413" text-anchor="middle" fill="#acabaa">⌘</text>
      <text x="957" y="413" text-anchor="middle" fill="#acabaa">S</text>
