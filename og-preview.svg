    <text x="326" y="188" fill="#ffffff" font-size="44" font-weight="500" font-family="Inter, Arial, sans-serif">Complete Canva shortcut guide</text>
    <line x1="326" y1="210" x2="998" y2="210" stroke="#2a2a2a" stroke-width="2" />

    <g font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#ffffff">
      <text x="326" y="280">Undo</text>
      <text x="326" y="350">Redo</text>
      <text x="326" y="420">Save</text>
    </g>

