<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Canva Vault</title>
  <desc id="desc">Canva keyboard shortcuts cheat sheet for Mac and Windows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171717" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)" />
  <circle cx="1050" cy="110" r="180" fill="#a78bfa" opacity="0.12" />
  <circle cx="180" cy="540" r="220" fill="#a78bfa" opacity="0.08" />

  <g transform="translate(72 72)" filter="url(#shadow)">
