            - generic [ref=e549]:
              - heading "People also viewed" [level=4] [ref=e550]
              - generic [ref=e552]:
                - link "Undo and redo changes You can undo and redo changes made to your design in the editor. To undo a change, click on Undo next to Resize . To redo a change, click on Redo . You can also press CMD+Z (Mac) or CTRL+Z (Windows) on your keyboard to undo, and CMD + Y (Mac) or CTRL + Y (Windows) to redo." [ref=e553] [cursor=pointer]:
                  - /url: /help/undo-and-redo-changes/
                  - generic [ref=e554]:
                    - paragraph [ref=e555]: Undo and redo changes
                    - paragraph [ref=e558]: You can undo and redo changes made to your design in the editor. To undo a change, click on Undo next to Resize . To redo a change, click on Redo . You can also press CMD+Z (Mac) or CTRL+Z (Windows) on your keyboard to undo, and CMD + Y (Mac) or CTRL + Y (Windows) to redo.
                - link [ref=e559] [cursor=pointer]:
                  - /url: /help/slash-magic-shortcut-commands/
                  - generic [ref=e560]:
                    - paragraph [ref=e561]: Use Quick actions
                    - paragraph [ref=e564]: "Simplify your search with the Quick actions . Quickly find anything you need to create stunning designs and instantly access features, like Magic Write, Background Remover, and more. This feature is currently only available on your computer. Click the Quick actions button. Alternatively, you can press / on your keyboard, or press CMD + E (Mac) or CTRL + E (Windows). Type in what you’re looking for. Available suggestions will appear as you type. Browse through the suggestions by scrolling or pressing on the arrow keys on your keyboard. You can also select See all. This takes you to the side panel to see more suggestions. Press ENTER on your keyboard to select a suggestion. What can you do with the Quick actions button? Search for elements, graphics, photos, templates, videos, and so much more just by typing a keyword. Access design recommendations like photos, fonts and graphics that match your design. Press a single key as a shortcut for everything Canva has to offer - add animations, access Canva features like Background Remover and Photo Editor, download and share your designs, access your Projects folder, and more. Tip: Try pressing / on your keyboard and then typing “heart” to add it to your design. If you need help, you can access our AI-powered assistant by selecting the Help Assistant button at the bottom right corner of the editor. The Help Assistant may not be available in your language. It's also not available for some Canva Education subscriptions. Administrators can disable the AI-powered assistant by following the steps below. Select Settings. Select Permissions , and then select Magic and AI. Under Who can the AI-powered assistant generate original content for? , select the drop-down and choose an option. Once disabled, the assistant will only be able to generate original content for permitted members or students. Everyone else will be directed to help articles related to their query."
                - link [ref=e565] [cursor=pointer]:
                  - /url: /help/canva-accessibility-features/
                  - generic [ref=e566]:
                    - paragraph [ref=e567]: Canva accessibility features
                    - paragraph [ref=e570]: Customize your design experience with keyboard navigation, light and dark modes, and options for color contrast. You can now also create accessible designs by adding Alternative Text and turning on auto-generated captions for videos. Keyboard shortcuts See our keyboard shortcuts to help you design on your device. Light and dark modes Switch between light, dark, or even sync with your system settings. See Light and dark mode settings for details. Enabling high color contrast is also available. Enable video captions Enable captions to let more people watch and interact with your videos. These are available for all spoken-word video and audio content in Canva. Video auto-play Avoid surprises with video and audio by choosing how videos play on your Canva designs. On the homepage, select your account profile to open the menu. Choose Settings . Select Accessibility . Under Autoplay videos , select the dropdown menu and choose your preferred setting. Use Alternative Text Describe your images and elements using alternative text . This enables people with visual or cognitive impairments to experience your designs. Translate your designs Automatically translate pages of your designs to make them accessible worldwide. We currently support over 100+ languages. Increase on-screen message display time You can let on-screen messages stay longer by enabling this setting. On the homepage, select your account profile to open the menu. Choose Settings . Select Accessibility . Screen reader language settings Optimize your design's accessibility for screen readers. From your selected design, press File . Select Language. Select dropdown to select your language from the list. Select language to choose the language and confirm the one used in your design. PDF accessibility features PDFs now include heading tags and reading order, enhancing the reading experience for screen reader users. This feature is available for all PDF-published documents. Learn more about PDF accessibility features. Reduce animations and remove transitions To support the diverse needs of different audiences, you can turn on or off the Reduce motion setting when viewing or presenting designs. Learn how to use the Reduce motion settings.
                - link [ref=e571] [cursor=pointer]:
                  - /url: /help/layer-group-align/
                  - generic [ref=e572]:
                    - paragraph [ref=e573]: Group, layer, and align elements
                    - paragraph [ref=e576]: "Have more control over elements in your design by changing their groupings, layers, and alignment. Group and ungroup elements Drag your cursor over the elements you want to group. You can also hold Shift on your keyboard, and click on multiple elements to select them. On the floating toolbar, select Group . To edit an element inside a group: Click on the group to select it. Then select an element in the group. You can: Use corner handles to resize Rotate using the rotate handle Drag to move the element Note: The group stays intact while individual changes are applied. To ungroup all elements, select the entire group, and then select Ungroup from the floating toolbar. To remove a single element from the group, choose one element to remove, then select Ungroup . Keyboard shortcut : After selecting the elements, press Command + G (Mac) or Ctrl + G (Windows) to group them. Tap and hold an element until a menu appears. Tap Select Multiple , and then tap on other elements to add them to the group. On the floating toolbar, tap Group . To edit an element inside a group: Tap on the group to select it. Then tap an element in the group. You can: Use corner handles to resize Rotate using the rotate handle Drag to move the element Note: The group stays intact while individual changes are applied. To ungroup all elements, select the entire group, and then tap Ungroup from the floating toolbar. To remove a single element from the group, choose one element to remove, then tap Ungroup . You can group all element types, including charts, tables, and grids, except for sheet elements. You can’t group content created by third-party apps from the Apps tab with other elements in your design. To make it groupable, right-click the content, select Download selection , and save it as a PNG or JPG. Re-upload the file to Canva and add it to your design. It will behave like a regular image that you can group with other elements. Change element layers or alignment When added to your design, elements are in layers. The front layers are on top of the layers at the back. Alignment moves your element where you choose, with respect to the design page. Select the element you want to edit. To select multiple elements, hold Shift on your keyboard, and click to add other elements to the selection. On the toolbar above the editor, click Position , and refer below depending on what you want to do. If you don’t see it, click the button first. Tap the element that you want to edit. To select multiple elements, tap and hold an element until a menu appears. Tap Select Multiple , and then tap on other elements to add them to the selection. On the toolbar below the editor, tap Position . If you don’t see it, swipe through the toolbar options. Refer below depending on what you want to do. Rearrange element layers Select from the Forward , Backward , To front , or back options. Options may differ depending on the order of layers in your design. Align elements Align to page. These options become available when there’s only one element selected. They use your design page as the point of reference for alignment. Align elements . These appear when you have more than one element selected. They use the positions of all selected elements as the basis for alignment."
